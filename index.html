<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Game | Aim Training</title>
        <link rel="stylesheet" href="./css/main.css">
    </head>
    <body>
        <main class="main">

            <section class="screen">
                <h1 class="title_1">Aim Training</h1>
                <a href="#" class="link-start" id="start">Начать игру</a>
            </section>

            <section class="screen">
                <h1 class="title_1">Выберите Размер</h1>
                <ul class="list-time" id="size_list">
                    <li><button class="btn-size" data-width="300" data-height="300">Маленький<br><small>300×300</small></button></li>
                    <li><button class="btn-size" data-width="500" data-height="500">Средний<br><small>500×500</small></button></li>
                    <li><button class="btn-size" data-width="700" data-height="700">Большой<br><small>700×700</small></button></li>
                    <li><button class="btn-size" data-width="1200" data-height="800">Супер Большой<br><small>1200×800</small></button></li>
                </ul>
                <div class="range-container">
                    <label for="range-input">Выберите значение в мс для автоигры:</label>
                    <div>
                        <input class="range-inpt" type="range" id="range-input" min="0" max="1000" value="500">
                        <span class="range-val" id="range-value">500ms</span>
                    </div>
                </div>
                <button class="btn-next" id="btn_next">Далее</button>
            </section>

            <section class="screen">
                <h1 class="title_1">Выберите Время</h1>
                <ul class="list-time" id="time_list">
                    <li><button class="btn-time" data-time="5">5 сек</button></li>
                    <li><button class="btn-time" data-time="10">10 сек</button></li>
                    <li><button class="btn-time" data-time="20">20 сек</button></li>
                    <li><button class="btn-time" data-time="40">40 сек</button></li>
                    <li><button class="btn-time" data-time="60">60 сек</button></li>
                </ul>
            </section>

            <section class="screen">
                <div class="game-header">
                    <h2>Осталось <span id="time">00:00</span></h2>
                </div>
                <div class="board" id="board"></div>
            </section>

        </main>
        <script src="./js/main.js" type="module"></script>
    </body>
</html>
